# ============================================================
#  Agentic Resume Matcher — Central Configuration
#  All tunable parameters live here. Code reads this file.
# ============================================================

azure_openai:
  chat_deployment: gpt-4o
  embedding_deployment: text-embedding-3-small
  api_version: "2024-02-01"
  api_version_embedding: "2024-02-01"
  temperature: 0
  max_tokens: 1200

qdrant:
  # Collections (separate from any prior projects)
  resume_collection: resumes_index
  jd_collection: jd_index
  vector_size: 1536          # text-embedding-3-small default

retrieval:
  top_k_vector: 20           # Vector search pulls top 20
  top_k_bm25: 20             # BM25 pulls top 20
  top_k_final: 5             # Final results shown in UI
  rrf_k: 60                  # RRF constant (literature default)

reranking:
  # Uses sentence-transformers CrossEncoder locally (no API cost)
  cross_encoder_model: cross-encoder/ms-marco-MiniLM-L-6-v2
  top_k_rerank: 10           # Feed top 10 to cross-encoder

ats_weights:
  skills:          0.40
  experience:      0.30
  projects:        0.15
  education:       0.10
  certifications:  0.05

final_score_weights:
  semantic_similarity: 0.40
  skill_match:         0.30
  experience_score:    0.20
  ats_score:           0.10

validation:
  max_retries: 3
  retry_backoff_seconds: 2   # Doubles each retry: 2s, 4s, 8s

logging:
  log_file: logs/pipeline.log
  level: INFO

data:
  resumes_dir: data/resumes
  jd_dir: data/jd
